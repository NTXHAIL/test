<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NTX Hail — Insurance Matrix Estimator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
  <style>
    :root {
      --ntx-blue: #00D4FF;
      --ntx-black: #000000;
      --ntx-surface: #111111;
      --ntx-text: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--ntx-black); color: var(--ntx-text); }
    .header { background: var(--ntx-surface); border-bottom: 2px solid var(--ntx-blue); padding: 15px; position: sticky; top: 0; z-index: 100; }
    .carrier-select { background: #1a1a1a; border: 1px solid var(--ntx-blue); color: var(--ntx-blue); padding: 8px; border-radius: 5px; font-weight: bold; width: 100%; margin-top: 10px; }
    /* Logic for MCE Warnings */
    .mce-warning { color: #ff4444; font-size: 11px; font-weight: bold; margin-top: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- PRICING DATA OBJECT ---
    const CARRIER_DATA = {
      STATE_FARM: {
        label: "State Farm (Standard)",
        matrix: {
          HOOD: [
            { range: "1-5", min: 1, max: 5, DIME: 80, NICKEL: 100, QUARTER: 125, HALF: 150 },
            { range: "6-15", min: 6, max: 15, DIME: 125, NICKEL: 175, QUARTER: 200, HALF: 250 },
            { range: "16-30", min: 16, max: 30, DIME: 200, NICKEL: 225, QUARTER: 275, HALF: 350 },
            { range: "31-50", min: 31, max: 50, DIME: 300, NICKEL: 350, QUARTER: 425, HALF: 500 }
          ],
          ROOF: [
            { range: "1-5", min: 1, max: 5, DIME: 100, NICKEL: 125, QUARTER: 150, HALF: 200 },
            { range: "6-15", min: 6, max: 15, DIME: 175, NICKEL: 225, QUARTER: 250, HALF: 325 }
          ]
          // Add remaining SF panels...
        }
      },
      FARMERS: {
        label: "Farmers (March 2026)",
        matrix: {
          HOOD: [
            { range: "1-5", min: 1, max: 5, DIME: 75, NICKEL: 100, QUARTER: 125, HALF: 150 },
            { range: "6-15", min: 6, max: 15, DIME: 125, NICKEL: 175, QUARTER: 200, HALF: 300 },
            { range: "16-30", min: 16, max: 30, DIME: 200, NICKEL: 250, QUARTER: 300, HALF: 375 }
          ],
          ROOF: [
            { range: "1-5", min: 1, max: 5, DIME: 100, NICKEL: 125, QUARTER: 150, HALF: 200 },
            { range: "6-15", min: 6, max: 15, DIME: 175, NICKEL: 225, QUARTER: 250, HALF: 375 }
          ]
        },
        aluminumMarkup: 0.25 // [cite: 36]
      },
      USAA: {
        label: "USAA (July 2025)",
        matrix: {
          HOOD: [
            { range: "1-5", min: 1, max: 5, DIME: 80, NICKEL: 100, QUARTER: 125, HALF: 150 },
            { range: "6-15", min: 6, max: 15, DIME: 125, NICKEL: 175, QUARTER: 200, HALF: 250 }
          ],
          ROOF: [
            { range: "1-5", min: 1, max: 5, DIME: 100, NICKEL: 125, QUARTER: 150, HALF: 200 },
            { range: "6-15", min: 6, max: 15, DIME: 175, NICKEL: 225, QUARTER: 250, HALF: 325 }
          ]
        },
        aluminumDoubleMarkup: 0.35 // [cite: 496]
      }
      // Add GEICO, ALLSTATE, etc. following same structure [cite: 8, 48, 324, 471]
    };

    function HailScope() {
      const [carrier, setCarrier] = useState("STATE_FARM");
      const [panelData, setPanelData] = useState({});

      const handleCarrierChange = (e) => {
        setCarrier(e.target.value);
        // Alert user that switching carrier resets price calculations
      };

      return (
        <div style={{ maxWidth: '480px', margin: '0 auto', background: '#000', minHeight: '100vh' }}>
          <header className="header">
            <h1 style={{ color: '#00D4FF', fontSize: '20px', fontWeight: '900' }}>NTX HAIL SCOPE</h1>
            <select className="carrier-select" value={carrier} onChange={handleCarrierChange}>
              {Object.keys(CARRIER_DATA).map(key => (
                <option key={key} value={key}>{CARRIER_DATA[key].label}</option>
              ))}
            </select>
          </header>

          <main style={{ padding: '20px' }}>
            {/* Diagram and Editor Components go here, passing 'carrier' as a prop */}
            <div style={{ background: '#111', padding: '15px', borderRadius: '10px', border: '1px solid #222' }}>
              <h2 style={{ fontSize: '14px', color: '#888' }}>CURRENT MATRIX: {CARRIER_DATA[carrier].label}</h2>
              <p style={{ fontSize: '12px', marginTop: '10px' }}>
                Pricing and add-ons are now being calculated using {carrier.replace('_', ' ')} guidelines. 
                {carrier === 'LIBERTY_MUTUAL' && " Note: 35% maximum cap applies per panel."}
              </p>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HailScope />);
  </script>
</body>
</html>
